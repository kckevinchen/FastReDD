# Data Population - SiliconFlow Qwen3-30B-A3B-Instruct-2507

# =============================== Common Settings ===============================
default_settings: &default
  mode: "siliconflow"
  trial: 1
  llm_model: "Qwen/Qwen3-30B-A3B-Instruct-2507"
  console_log_level: "WARNING"
  data_loader_type: "sqlite"
  shuffle_documents: false

# Data population common settings
data_pop_common: &data_pop_common
  prompts:
    prompt_table: "prompts/datapop_table_json.txt"
    prompt_attr: "prompts/datapop_attr_json.txt"
  eval:
    mode: "deepseek"
    llm_model: "deepseek-chat"
    prompts:
      datapop_cmp_str: "prompts/eval_datapop_cmp_str.txt"
  classifier_threshold: 0.5

# =============================== Flight Dataset ===============================
flight_common: &flight_common
  <<: [*default, *data_pop_common]
  data_main: "dataset/spider_sqlite/"
  out_main: "outputs/data_pop/spider/"
  exp_dataset_task_list: ["flight_4/routes-airports-airlines.db"]
  schemagen:
    out_main: "outputs/schema_gen/spider/"
    param_str: "mdlqwen330b2507_prm5d0_reddv0"

flight_reddv0:
  <<: *flight_common
  res_param_str: "mdlqwen330b2507_reddv0"


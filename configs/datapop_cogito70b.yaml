default_settings: &default
  data_main: "dataset/"
  spider_path: "dataset/spider_update/"
  exp_dataset_task_list: null
  console_log_level: "WARNING"  # Console logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  
  # Data Loader Configuration
  data_loader_type: "spider"  # Options: "spider", "perfile", "sqlite"

spider_1:  &spider_1
  <<: *default
  mode: "local"
  trial: 1
  torch_seed: 888
  out_main: "outputs/data_population/spider_cogito70b_1/"
  exp_dataset_task_list: ["flight_4/routes-airports-airlines"]
  llm_model: "deepcogito/cogito-v1-preview-llama-70B"
  llm_model_path: "llm_models/deepcogito/cogito-v1-preview-llama-70B"
  res_param_str: "mdlcogito70b"
  prompts:
    prompt_table: "prompts/datapop_table_json.txt"
    prompt_attr: "prompts/datapop_attr_json.txt"
  eval:
    mode: "deepseek"
    llm_model: "deepseek-chat"
    prompts:
      datapop_cmp_str: "prompts/eval_datapop_cmp_str.txt"
  trainer:
    train_percentage: 0.8  # TODO
    batch_size: 128
    epochs: 200
    early_stop_patience: 10
    learning_rate: 0.0003
  schemagen:
    out_main: "outputs/schema_gen/spider_cgpt_1/"
    param_str: "mdlgpt-4o_prm4d1_tmp1.0_tpp1.0"
